      # ---------------------------------------------------------------

      - name: Placeholder
        run: echo "TODO — add test and lint steps"

  # Gate job: single required status check for branch protection
  ci:
    name: CI
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Test job failed"
            exit 1
          fi
          echo "All checks passed"
